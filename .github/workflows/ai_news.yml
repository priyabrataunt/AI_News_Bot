name: AI News Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"   # every day at 9 UTC

jobs:
  news-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: pip install requests

      - name: Run bot
        run: python ai_news_bot.py

      - name: Commit updates
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add ai_news.md
          git commit -m "Update AI news"
          git pull --rebase
          git push
